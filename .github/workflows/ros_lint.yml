name: ROS 2 Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ament_lint:
    runs-on: ubuntu-latest
    container: ros:jazzy
    steps:
      - uses: actions/checkout@v4
      - name: Install linters
        run: |
          apt-get update
          apt-get install -y ros-jazzy-ament-copyright ros-jazzy-ament-flake8 ros-jazzy-ament-pep257
      - name: Run ament_copyright
        run: |
          . /opt/ros/jazzy/setup.sh
          ament_copyright src/
      - name: Run ament_flake8
        run: |
          . /opt/ros/jazzy/setup.sh
          ament_flake8 src/
      - name: Run ament_pep257
        run: |
          . /opt/ros/jazzy/setup.sh
          ament_pep257 src/
