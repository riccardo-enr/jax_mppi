name: Tests

on:
    push:
        branches: [main]
        paths:
            - "**.py"
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Set up Python
              run: uv python install 3.12

            - name: Install dependencies
              run: |
                  uv venv
                  uv pip install "jax[cuda13]" numpy jaxtyping chex pytest "gymnasium[classic_control]" matplotlib basedpyright "ruff>=0.14.14" "cma>=3.3.0" "evosax>=0.1.0" "ray[tune]>=2.0.0" "hyperopt>=0.2.7" "bayesian-optimization>=1.4.0" "ribs[all]>=0.6.0"

            - name: Run tests
              env:
                PYTHONPATH: src
              run: uv run pytest tests/
